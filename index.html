<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imposter</title>
    <style>
        body {
            background-color: #1a1a2e;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #16213e;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.5);
            text-align: center;
            width: 300px;
        }
        h1 {
            margin-top: 0;
            color: #e94560;
            font-size: 2.8em;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        p {
            color: #a0a0a0;
            margin-bottom: 20px;
        }
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: none;
            border-radius: 6px;
            box-sizing: border-box;
            background-color: #0f3460;
            color: white;
            font-size: 1em;
        }
        input::placeholder {
            color: #8b9bb4;
        }
        input:focus {
            outline: 2px solid #e94560;
        }
        button {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: none;
            border-radius: 6px;
            background-color: #e94560;
            color: white;
            font-size: 1.1em;
            cursor: pointer;
            font-weight: bold;
            transition: background-color 0.2s;
        }
        button:hover {
            background-color: #d1304b;
        }
        .divider {
            margin: 20px 0;
            border-bottom: 2px solid #0f3460;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Imposter</h1>
        <p>Who is hiding in plain sight?</p>
        
        <input type="text" id="playerName" placeholder="Enter your name" autocomplete="off">
        
        <button onclick="alert('This will create a room in Phase 2!')">Create New Game</button>
        
        <div class="divider"></div>
        
        <input type="text" id="roomCode" placeholder="Enter 4-digit room code" autocomplete="off" maxlength="4">
        <button onclick="alert('This will join a room in Phase 2!')">Join Game</button>
    </div>

</body>
</html>
