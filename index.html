<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imposter</title>
    <style>
        body {
            background-color: #1a1a2e;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #16213e;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.5);
            text-align: center;
            width: 300px;
        }
        .hidden {
            display: none !important;
        }
        h1 {
            margin-top: 0;
            color: #e94560;
            font-size: 2.8em;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        p {
            color: #a0a0a0;
            margin-bottom: 20px;
        }
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: none;
            border-radius: 6px;
            box-sizing: border-box;
            background-color: #0f3460;
            color: white;
            font-size: 1em;
        }
        input::placeholder {
            color: #8b9bb4;
        }
        input:focus {
            outline: 2px solid #e94560;
        }
        button {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: none;
            border-radius: 6px;
            background-color: #e94560;
            color: white;
            font-size: 1.1em;
            cursor: pointer;
            font-weight: bold;
            transition: background-color 0.2s;
        }
        button:hover {
            background-color: #d1304b;
        }
        .divider {
            margin: 20px 0;
            border-bottom: 2px solid #0f3460;
        }
        .player-list {
            list-style: none;
            padding: 0;
            margin: 20px 0;
            text-align: left;
        }
        .player-list li {
            background-color: #0f3460;
            padding: 10px;
            margin-bottom: 5px;
            border-radius: 4px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="startScreen" class="container">
        <h1>Imposter</h1>
        <p>Who is hiding in plain sight?</p>
        
        <input type="text" id="playerName" placeholder="Enter your name" autocomplete="off">
        
        <button id="createBtn">Create New Game</button>
        
        <div class="divider"></div>
        
        <input type="text" id="roomCodeInput" placeholder="Enter 4-digit room code" autocomplete="off" maxlength="4">
        <button id="joinBtn">Join Game</button>
        
        <p id="errorMessage" style="color: #ff6b6b; margin-top: 15px; display: none;"></p>
    </div>

    <div id="lobbyScreen" class="container hidden">
        <h1 style="font-size: 2em;">Room: <span id="displayRoomCode" style="color: white;"></span></h1>
        <p>Waiting for players...</p>
        
        <ul id="playerList" class="player-list">
            </ul>
        
        <button id="startGameBtn">Start Game</button>
    </div>

    <script type="module">
        // 1. Import Firebase from the CDN
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
        import { getDatabase, ref, set, get, onValue } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-database.js";

        // 2. Your specific configuration
        const firebaseConfig = {
            apiKey: "AIzaSyD7P2xRacaPxA7HjOh7wDHZ6vMZpcFhgbM",
            authDomain: "crazy-impostor-game.firebaseapp.com",
            databaseURL: "https://crazy-impostor-game-default-rtdb.firebaseio.com", 
            projectId: "crazy-impostor-game",
            storageBucket: "crazy-impostor-game.firebasestorage.app",
            messagingSenderId: "508771155615",
            appId: "1:508771155615:web:775d5b8988f71fc37a2caa"
        };

        // 3. Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // 4. HTML Elements
        const startScreen = document.getElementById('startScreen');
        const lobbyScreen = document.getElementById('lobbyScreen');
        const playerNameInput = document.getElementById('playerName');
        const roomCodeInput = document.getElementById('roomCodeInput');
        const displayRoomCode = document.getElementById('displayRoomCode');
        const playerListElement = document.getElementById('playerList');
        const errorMessage = document.getElementById('errorMessage');

        let currentRoom = "";
        let currentPlayerName = "";

        // --- Helper function to show errors ---
        function showError(msg) {
            errorMessage.innerText = msg;
            errorMessage.style.display = 'block';
            setTimeout(() => { errorMessage.style.display = 'none'; }, 3000);
        }

        // --- CREATE GAME LOGIC ---
        document.getElementById('createBtn').addEventListener('click', () => {
            const name = playerNameInput.value.trim();
            if (!name) return showError("Please enter your name!");

            // Generate a random 4-digit code
            const code = Math.floor(1000 + Math.random() * 9000).toString();
            
            // Create the room in Firebase
            set(ref(db, 'rooms/' + code + '/players/' + name), {
                isHost: true
            }).then(() => {
                enterLobby(code, name);
            });
        });

        // --- JOIN GAME LOGIC ---
        document.getElementById('joinBtn').addEventListener('click', () => {
            const name = playerNameInput.value.trim();
            const code = roomCodeInput.value.trim();
            
            if (!name) return showError("Please enter your name!");
            if (code.length !== 4) return showError("Room code must be 4 digits!");

            // Check if room exists in Firebase
            get(ref(db, 'rooms/' + code)).then((snapshot) => {
                if (snapshot.exists()) {
                    // Add player to the room
                    set(ref(db, 'rooms/' + code + '/players/' + name), {
                        isHost: false
                    }).then(() => {
                        enterLobby(code, name);
                    });
                } else {
                    showError("Room not found!");
                }
            });
        });

        // --- ENTER LOBBY & LISTEN FOR OTHERS ---
        function enterLobby(code, name) {
            currentRoom = code;
            currentPlayerName = name;
            
            // Switch screens
            startScreen.classList.add('hidden');
            lobbyScreen.classList.remove('hidden');
            displayRoomCode.innerText = code;

            // Listen to the database for any new players joining this room
            const playersRef = ref(db, 'rooms/' + code + '/players');
            onValue(playersRef, (snapshot) => {
                const data = snapshot.val();
                playerListElement.innerHTML = ''; // Clear the list
                
                if (data) {
                    // Loop through all players and add them to the screen
                    Object.keys(data).forEach(playerName => {
                        const li = document.createElement('li');
                        li.innerText = playerName + (data[playerName].isHost ? " 👑" : "");
                        playerListElement.appendChild(li);
                    });
                }
            });
        }
    </script>
</body>
</html>
